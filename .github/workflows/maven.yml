name: Java CI with Maven (Dev Build Release)

permissions:
  contents: write

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Generate Dev Tag
        run: |
          echo "TAG=dev-build-${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV


      - name: Extract Commit Title
        run: |
          COMMIT_TITLE="$(git log -1 --pretty=%s)"
          echo "COMMIT_TITLE=$COMMIT_TITLE" >> $GITHUB_ENV

      - name: Create GitHub Release + Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.COMMIT_TITLE }}
          prerelease: true
          files: target/shyamduels-*.jar
          body: |
            🚧 **Development Build**

            This is an automated dev build generated from the latest commit.

            🔹 Branch: `${{ github.ref_name }}`
            🔹 Commit: `${{ github.sha }}`
            🔹 Build Number: `${{ github.run_number }}`

            🐛 Found a bug? Report it here:
            https://github.com/ShyamStudios/ShyamDuels/issues

            ⚠️ This build may contain bugs. Use for testing only.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
