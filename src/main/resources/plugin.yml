name: ShyamDuels
version: ${project.version}
main: dev.piyush.shyamduels.ShyamDuels
api-version: '1.20'
authors: [Piyush]
description: High-performance dueling plugin with ELO, parties, FFA, and advanced kit system
website: https://github.com/yourusername/shyamduels
depend: [FastAsyncWorldEdit]
softdepend: [PlaceholderAPI]
libraries:
  - com.github.ben-manes.caffeine:caffeine:3.1.8
  - org.xerial:sqlite-jdbc:3.45.3.0
  - com.mysql:mysql-connector-j:8.3.0
  - com.mchange:c3p0:0.9.5.5

permissions:
  shyamduels.admin:
    description: Full admin access to all commands
    default: op
  shyamduels.vip:
    description: VIP features including armor trims and larger parties
    default: false
  shyamduels.use:
    description: Basic plugin usage
    default: true

commands:
  duel:
    description: Challenge players to duels
    usage: /duel <player>
    aliases: [1v1]
  
  ffa:
    description: Join Free For All mode
    usage: /ffa [arena]
    aliases: [freefora ll]
  
  queue:
    description: Join ranked matchmaking
    usage: /queue [mode]
    aliases: [play, ranked]
  
  kiteditor:
    description: Customize your kit layouts
    usage: /kiteditor [kit]
    aliases: [editkit, kitedit]
  
  leavefight:
    description: Leave current match or return to lobby
    usage: /leavefight
    aliases: [leave, spawn, lobby]
  
  arena:
    description: Arena management commands
    usage: /arena <create|delete|list|...>
    permission: shyamduels.admin
    aliases: [arenas]
  
  kit:
    description: Kit management commands
    usage: /kit <create|delete|list|...>
    permission: shyamduels.admin
    aliases: [kits]
  
  shyamduels:
    description: Main plugin command
    usage: /shyamduels [reload]
    permission: shyamduels.admin
    aliases: [sd, duels]
  
  spectate:
    description: Spectate active matches
    usage: /spectate [player]
    aliases: [spec, watch]
  
  party:
    description: Party management
    usage: /party <create|invite|accept|...>
    aliases: [p, team]
  
  partychat:
    description: Toggle party chat mode
    usage: /partychat
    aliases: [pc, pchat]
